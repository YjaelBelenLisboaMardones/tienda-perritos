version: '3.8'
services:
  db:
    build: ./db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: tienda_perritos
      MYSQL_USER: admin
      MYSQL_PASSWORD: alumno123
      MYSQL_ROOT_PASSWORD: alumno123

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_USER: admin
      DB_PASSWORD: alumno123
      DB_NAME: tienda_perritos
      DB_PORT: 3306
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:80"